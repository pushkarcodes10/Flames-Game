<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flames-Game</title>
    <link rel="stylesheet" href="/src/output.css">
</head>
<body class="bg-pitch-black h-screen flex items-center justify-center">
    <div id="main-card" class="bg-beige-light w-145 h-150 rounded-3xl p-8 flex justify-center items-center flex-col ">
        <h2 class="text-center text-6xl font-fredoka ">FLAMES</h2>
        <form class="mt-8 flex flex-col justify-center items-center">
            <input id="boy-name" class="border-gray-700 border-2 w-100 text-center p-3 text-2xl rounded-xl bg-white font-poppins" placeholder="Enter Boy's Name" type="text" required>  <br>
            <input id="girl-name" class="border-gray-700 border-2 w-100 text-center p-3 text-2xl rounded-xl bg-white font-poppins" placeholder="Enter Girl's Name" type="text" required>    <br>
            <button id="showResultBtn" class="text-center text-2xl bg-red-500 rounded-xl p-3 cursor-pointer font-poppins" type="button">What are we?</button>
        </form>
        <p class="font-poppins mt-8 text-xl " id="result"></p>
    </div>
</body>
<script src="./script.js"></script>
</html>
